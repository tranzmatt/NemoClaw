#
# Sandbox policy for the Hermes Agent.
# Based on the OpenClaw policy with agent-specific adjustments:
#   - .hermes instead of .openclaw (single config/state directory)
#   - Nous Research phone-home endpoints instead of OpenClaw/ClawHub
#   - PyPI instead of npm registry
#   - /usr/local/bin/hermes and python3 binary restrictions
#
# Principle: deny by default, allow only what's needed for core functionality.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /opt/hermes
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    # Agent config/state root. Shields-up locks config.yaml/.env and the
    # parent directory, but intentionally leaves /sandbox/.hermes/.hermes_history
    # as sandbox:sandbox 0660 because prompt_toolkit FileHistory appends there
    # on every Hermes TUI keypress. Remove that exception if upstream supports
    # redirecting or disabling file history.
    - /sandbox/.hermes

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  managed_inference:
    name: managed_inference
    endpoints:
      - host: inference.local
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: POST, path: "/v1/chat/completions" }
          - allow: { method: POST, path: "/v1/messages" }
          - allow: { method: POST, path: "/v1/responses" }
          - allow: { method: POST, path: "/v1/completions" }
          - allow: { method: POST, path: "/v1/embeddings" }
          - allow: { method: GET, path: "/v1/models" }
          - allow: { method: GET, path: "/v1/models/**" }
    binaries:
      - { path: /usr/local/bin/hermes }
      - { path: /usr/bin/python3.11 }
      - { path: /opt/hermes/.venv/bin/python }

  nvidia:
    name: nvidia
    endpoints:
      - host: integrate.api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: POST, path: "/v1/chat/completions" }
          - allow: { method: POST, path: "/v1/completions" }
          - allow: { method: POST, path: "/v1/embeddings" }
          - allow: { method: GET, path: "/v1/models" }
          - allow: { method: GET, path: "/v1/models/**" }
    binaries:
      - { path: /usr/local/bin/hermes }
      - { path: /usr/bin/python3* }
      - { path: /opt/hermes/.venv/bin/python }

  # NOTE: github.com / api.github.com and the git binary used to
  # live in this base policy and were therefore granted to every
  # Hermes sandbox regardless of user opt-in. They have been moved
  # into a discoverable preset (`presets/github.yaml`) so a sandbox
  # only gets GitHub access when the user explicitly selects the
  # `github` preset during onboard.

  # ── Nous Research — public metadata and agent updates ─────────
  # Nous Portal OAuth, managed inference, and managed tool gateway auth are
  # host-managed by NemoClaw/OpenShell. The sandbox should not reach the Portal
  # or Nous vendor gateway hosts directly.
  nous_research:
    name: nous_research
    endpoints:
      - host: nousresearch.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: hermes-agent.nousresearch.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/hermes }
      - { path: /usr/bin/python3* }
      - { path: /opt/hermes/.venv/bin/python }

  # ── PyPI — needed for pip install (skill/plugin deps) ─────────
  pypi:
    name: pypi
    endpoints:
      - host: pypi.org
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      - host: files.pythonhosted.org
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/local/bin/pip3 }
      - { path: /usr/local/bin/curl }
      - { path: /usr/bin/python3* }
      - { path: /opt/hermes/.venv/bin/python }

  # ── Messaging policy templates ─────────────────────────────────
  # These entries are agent-specific channel templates. During sandbox
  # creation, NemoClaw filters out entries for messaging channels that were not
  # selected, so a Discord-only Hermes sandbox does not retain Telegram, Slack,
  # or WeChat egress.
  telegram:
    name: telegram
    endpoints:
      - host: api.telegram.org
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/bot*/**" }
          - allow: { method: POST, path: "/bot*/**" }
          - allow: { method: GET, path: "/file/bot*/**" }
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/python3* }
      - { path: /opt/hermes/.venv/bin/python }

  discord:
    name: discord
    endpoints:
      - host: discord.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: GET, path: "/gateway*" }
          - allow: { method: GET, path: "/api/v*/gateway/bot" }
          - allow: { method: GET, path: "/api/v*/applications/@me" }
          - allow: { method: PUT, path: "/api/v*/applications/*/commands" }
          - allow: { method: PUT, path: "/api/v*/channels/*/messages/*/reactions/*/@me" }
          - allow: { method: PATCH, path: "/api/v*/applications/*" }
          - allow: { method: PATCH, path: "/api/v*/applications/*/commands/*" }
          - allow: { method: PATCH, path: "/api/v*/channels/*/messages/*" }
          - allow: { method: PATCH, path: "/api/v*/webhooks/*/*/messages/*" }
          - allow: { method: DELETE, path: "/api/v*/applications/*/commands/*" }
          - allow: { method: DELETE, path: "/api/v*/channels/*/messages/*" }
          - allow: { method: DELETE, path: "/api/v*/channels/*/messages/*/reactions/*/*" }
          - allow: { method: DELETE, path: "/api/v*/webhooks/*/*/messages/*" }
      - host: gateway.discord.gg
        port: 443
        protocol: websocket
        enforcement: enforce
        websocket_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: WEBSOCKET_TEXT, path: "/**" }
      - host: "*.discord.gg"
        port: 443
        protocol: websocket
        enforcement: enforce
        websocket_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: WEBSOCKET_TEXT, path: "/**" }
      - host: cdn.discordapp.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/python3* }
      - { path: /opt/hermes/.venv/bin/python }

  slack:
    name: slack
    endpoints:
      - host: slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        request_body_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: api.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        request_body_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: hooks.slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        request_body_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: wss-primary.slack.com
        port: 443
        protocol: websocket
        enforcement: enforce
        websocket_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: WEBSOCKET_TEXT, path: "/**" }
      - host: wss-backup.slack.com
        port: 443
        protocol: websocket
        enforcement: enforce
        websocket_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: WEBSOCKET_TEXT, path: "/**" }
    binaries:
      - { path: /usr/local/bin/hermes }
      - { path: /usr/bin/python3* }
      - { path: /opt/hermes/.venv/bin/python }

  # WeChat (personal) via Tencent's iLink Bot API. The Hermes adapter uses
  # HTTP long-polling (no WebSocket). WEIXIN_TOKEN is L7-resolved at egress
  # from WECHAT_BOT_TOKEN (same credential slot OpenClaw's bridge uses) via
  # manifest hook render outputs. See nemoclaw-blueprint/policies/presets/wechat.yaml
  # for the shared host set.
  wechat_bridge:
    name: wechat_bridge
    endpoints:
      - host: ilinkai.weixin.qq.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: ilinkai.wechat.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/hermes }
      - { path: /usr/bin/python3* }
      - { path: /opt/hermes/.venv/bin/python }
