#
# Permissive policy for Hermes Agent — used by --dangerously-skip-permissions.
# All known Hermes-relevant endpoints opened with access: full (no L7 filtering).
# Filesystem: include_workdir: true makes the sandbox home directory writable.
#
# WARNING: This policy disables most sandbox security restrictions.
# Do not use in production.

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    - /sandbox/.hermes
  read_write:
    - /tmp
    - /dev/null
    - /sandbox/.hermes-data
    - /sandbox/.nemoclaw

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:

  claude_code:
    name: claude_code
    endpoints:
      - host: api.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: statsig.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: sentry.io
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: "/**" }

