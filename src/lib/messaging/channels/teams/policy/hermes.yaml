preset:
  name: teams
  description: "Hermes Microsoft Teams Bot Framework and Graph API access"

network_policies:
  teams:
    name: teams
    endpoints:
      - host: login.microsoftonline.com
        port: 443
        protocol: rest
        enforcement: enforce
        request_body_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: login.botframework.com
        port: 443
        protocol: rest
        enforcement: enforce
        request_body_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: api.botframework.com
        port: 443
        protocol: rest
        enforcement: enforce
        request_body_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: smba.trafficmanager.net
        port: 443
        protocol: rest
        enforcement: enforce
        request_body_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
          - allow: { method: DELETE, path: "/**" }
      - host: graph.microsoft.com
        port: 443
        protocol: rest
        enforcement: enforce
        request_body_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
      - host: teams.microsoft.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      - host: teams.cdn.office.net
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      - host: statics.teams.cdn.office.net
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      - host: "*.sharepoint.com"
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      - host: 1drv.ms
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/hermes }
      - { path: /usr/bin/python3* }
      - { path: /opt/hermes/.venv/bin/python }
