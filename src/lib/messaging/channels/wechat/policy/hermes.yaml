preset:
  name: wechat
  description: "Hermes WeChat (personal) iLink API access"

network_policies:
  wechat_bridge:
    name: wechat_bridge
    endpoints:
      - host: ilinkai.weixin.qq.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: ilinkai.wechat.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/hermes }
      - { path: /usr/bin/python3* }
      - { path: /opt/hermes/.venv/bin/python }
