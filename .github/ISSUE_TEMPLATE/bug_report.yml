name: Bug Report
description: Report a bug. Your agent should investigate first - see CONTRIBUTING.md.
type: Bug
labels: ["needs: triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Agent-First Troubleshooting

        NemoClaw is an agent-first project. Before filing this bug, point your coding agent at the repo and have it investigate using the available skills (`nemoclaw-skills-guide`, `nemoclaw-user-monitor-sandbox`, `nemoclaw-user-manage-sandboxes`, etc.). See [CONTRIBUTING.md](https://github.com/NVIDIA/NemoClaw/blob/main/CONTRIBUTING.md) for issue expectations.

  - type: textarea
    id: agent-diagnostic
    attributes:
      label: Agent Diagnostic
      description: |
        Paste the output from your agent's investigation of this bug. What skills did it load? What did it find? What did it try?
      placeholder: |
        Example:
        - Loaded `nemoclaw-user-monitor-sandbox`
        - Ran `nemoclaw status`, `nemoclaw list`, and `nemoclaw debug --quick`
        - Found the sandbox is registered but not ready after onboarding
        - Tried `nemoclaw debug --output /tmp/nemoclaw-debug.tar.gz`; the attached bundle still shows the failure
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `nemoclaw onboard`
        2. Select "local" inference
        3. ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, Docker version, NemoClaw version, and any other relevant details.
      placeholder: |
        - OS: Ubuntu 24.04 / Windows 11 + WSL2 / macOS 15.2
        - Hardware: DGX Spark / DGX Station / N1X / Jetson / x86_64 workstation / other
        - Node.js: v20.x
        - Docker: Docker Desktop 4.x / Docker Engine 27.x
        - NemoClaw: v0.x.x (output of `nemoclaw --version`)
    validations:
      required: true

  - type: textarea
    id: debug-output
    attributes:
      label: Debug Output
      description: |
        Run `nemoclaw debug --output /tmp/nemoclaw-debug.tar.gz` and attach the
        tarball, or paste the output of `nemoclaw debug --quick` below.
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Any additional log output, error messages, or stack traces not covered by the debug output above.
      render: shell
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I confirmed this bug is reproducible
          required: true
        - label: I searched existing issues and this is not a duplicate
          required: true
