<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- frame-ancestors is intentionally omitted here; helpers must send it as an HTTP header. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; base-uri 'none'; form-action 'self'; script-src 'sha256-7knX1kPQir4x3z0uoR2GmEi9hb0+82UEW2o9BzJD520='; style-src 'sha256-W4wSJyrmRXSCgQSjhVRZBhEmsaHh6dbUj9ZlKhxipME='; connect-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NemoClaw Local Credential Form</title>
    <style>
      :root {
        color-scheme: light dark;
        --accent: #76b900;
        --background: #0f172a;
        --border: #334155;
        --card: #111827;
        --danger: #f97316;
        --muted: #94a3b8;
        --text: #f8fafc;
      }

      body {
        background: var(--background);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        margin: 0;
        padding: 2rem;
      }

      main {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 1rem;
        box-shadow: 0 24px 60px rgb(0 0 0 / 0.3);
        margin: 0 auto;
        max-width: 44rem;
        padding: 2rem;
      }

      h1 {
        font-size: clamp(1.5rem, 3vw, 2rem);
        line-height: 1.15;
        margin: 0 0 0.75rem;
      }

      p {
        margin: 0 0 1rem;
      }

      .muted {
        color: var(--muted);
      }

      .notice {
        background: rgb(118 185 0 / 0.12);
        border: 1px solid rgb(118 185 0 / 0.4);
        border-radius: 0.75rem;
        margin: 1.25rem 0;
        padding: 1rem;
      }

      .warning {
        background: rgb(249 115 22 / 0.12);
        border-color: rgb(249 115 22 / 0.45);
      }

      label {
        display: block;
        font-weight: 700;
        margin: 1rem 0 0.35rem;
      }

      input {
        background: #020617;
        border: 1px solid var(--border);
        border-radius: 0.55rem;
        box-sizing: border-box;
        color: var(--text);
        font: inherit;
        padding: 0.75rem;
        width: 100%;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgb(118 185 0 / 0.25);
        outline: none;
      }

      button {
        background: var(--accent);
        border: 0;
        border-radius: 0.55rem;
        color: #111827;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        margin-top: 1.25rem;
        padding: 0.75rem 1rem;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      code {
        background: rgb(148 163 184 / 0.16);
        border-radius: 0.35rem;
        padding: 0.1rem 0.3rem;
      }

      pre {
        background: #020617;
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        overflow: auto;
        padding: 1rem;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NemoClaw Local Credential Form</h1>
      <p class="muted">
        Enter credentials here only when your coding agent opened this page from a local
        <code>127.0.0.1</code> helper server.
      </p>
      <div class="notice" id="origin-notice">
        This page sends values only to the loopback helper that served it.
      </div>
      <form autocomplete="off" id="credential-form">
        <div id="fields"></div>
        <button id="submit-button" type="submit">Send to Local Helper</button>
      </form>
      <section aria-live="polite" id="result"></section>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const fieldsElement = document.getElementById("fields");
      const form = document.getElementById("credential-form");
      const resultElement = document.getElementById("result");
      const submitButton = document.getElementById("submit-button");
      const originNotice = document.getElementById("origin-notice");

      const LOCAL_SUBMIT_PATH = "/submit";

      function isLoopbackHost(hostname) {
        return (
          hostname === "127.0.0.1" ||
          hostname === "localhost" ||
          hostname === "[::1]" ||
          hostname === "::1"
        );
      }

      function isValidFieldName(name) {
        return /^[A-Z][A-Z0-9_]{0,80}$/.test(name);
      }

      function toLabel(name) {
        return name
          .toLowerCase()
          .split("_")
          .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
          .join(" ");
      }

      function parseFieldSpec(spec) {
        const parts = spec.split(":");
        if (parts.length !== 2) {
          return null;
        }

        const [name, type] = parts;
        const normalizedName = name.trim().toUpperCase();
        const normalizedType = type.trim().toLowerCase();
        if (
          !isValidFieldName(normalizedName) ||
          (normalizedType !== "secret" && normalizedType !== "text")
        ) {
          return null;
        }
        return {
          name: normalizedName,
          secret: normalizedType === "secret",
        };
      }

      function configuredFields() {
        // The query string is untrusted helper input. Ambiguous or malformed schemas disable submit.
        const hasRepeatedSpecs = params.has("field");
        const hasCombinedSpecs = params.has("fields");
        if (hasRepeatedSpecs && hasCombinedSpecs) {
          return {
            fields: [],
            missing: false,
            rejected: ["field and fields cannot be combined"],
          };
        }

        const repeatedSpecs = params.getAll("field");
        const combinedValues = params.getAll("fields");
        if (combinedValues.length > 1) {
          return {
            fields: [],
            missing: false,
            rejected: ["fields cannot be repeated"],
          };
        }

        const combinedSpecs = hasCombinedSpecs
          ? (combinedValues[0] ?? "").split(",").map((field) => field.trim())
          : [];
        const specs = hasRepeatedSpecs ? repeatedSpecs : combinedSpecs;
        const fields = [];
        const rejected = [];
        const fieldNames = new Set();

        for (const spec of specs) {
          const parsed = parseFieldSpec(spec);
          if (parsed && !fieldNames.has(parsed.name)) {
            fieldNames.add(parsed.name);
            fields.push(parsed);
          } else {
            rejected.push(spec || "<blank>");
          }
        }

        return {
          fields,
          missing: specs.length === 0,
          rejected,
        };
      }

      function renderFields(fields) {
        fieldsElement.replaceChildren();
        for (const field of fields) {
          const label = document.createElement("label");
          label.setAttribute("for", field.name);
          label.textContent = toLabel(field.name);

          const input = document.createElement("input");
          input.autocomplete = "off";
          input.dataset.secret = String(field.secret);
          input.id = field.name;
          input.name = field.name;
          input.required = true;
          input.spellcheck = false;
          input.type = field.secret ? "password" : "text";

          fieldsElement.append(label, input);
        }
      }

      function valuesFromForm() {
        const data = new FormData(form);
        const values = {};
        for (const [key, value] of data.entries()) {
          values[key] = String(value);
        }
        return values;
      }

      function redactedSummary(fields, values) {
        return fields
          .map((field) => `${field.name}=${field.secret ? "********" : values[field.name]}`)
          .join("\n");
      }

      function clearSecretInputs() {
        for (const input of form.querySelectorAll("input[data-secret='true']")) {
          input.value = "";
        }
      }

      function showNotice({ warning = false, paragraphs, summary }) {
        const notice = document.createElement("div");
        notice.className = warning ? "notice warning" : "notice";

        for (const text of paragraphs) {
          const paragraph = document.createElement("p");
          paragraph.textContent = text;
          notice.append(paragraph);
        }

        if (summary) {
          const pre = document.createElement("pre");
          pre.textContent = summary;
          notice.append(pre);
        }

        resultElement.replaceChildren(notice);
      }

      function applyFieldConfigurationNotice(configuration) {
        if (configuration.missing) {
          submitButton.disabled = true;
          showNotice({
            warning: true,
            paragraphs: [
              "Credential fields are not configured.",
              "Ask your coding agent to reopen this form with a fields query such as ?fields=NVIDIA_INFERENCE_API_KEY:secret.",
            ],
          });
          return;
        }

        if (configuration.rejected.length > 0) {
          const paragraphs = [
            "Some credential field specs were rejected.",
            `Rejected specs: ${configuration.rejected.join(", ")}`,
            "Ask your coding agent to fix the field configuration before continuing.",
          ];
          submitButton.disabled = true;
          showNotice({ warning: true, paragraphs });
        }
      }

      function canSubmitCredentialForm() {
        return (
          isLoopbackHost(window.location.hostname) &&
          fields.length > 0 &&
          fieldConfiguration.rejected.length === 0 &&
          !fieldConfiguration.missing
        );
      }

      function userFacingSubmitError(error) {
        console.error("Local credential helper submission failed:", error);
        const message = error instanceof Error ? error.message : String(error);
        if (message.includes("Failed to fetch") || message.includes("NetworkError")) {
          return "Helper server is not responding. Ask your coding agent to restart the local credential form.";
        }
        if (message.startsWith("Local helper returned HTTP")) {
          return `${message}. Ask your coding agent to check the local helper and reopen the credential form.`;
        }
        if (message.startsWith("This form only submits")) {
          return message;
        }
        return "The local helper could not accept the credentials. Ask your coding agent to restart the local credential form.";
      }

      const fieldConfiguration = configuredFields();
      const fields = fieldConfiguration.fields;
      renderFields(fields);
      applyFieldConfigurationNotice(fieldConfiguration);

      if (!isLoopbackHost(window.location.hostname)) {
        submitButton.disabled = true;
        originNotice.classList.add("warning");
        originNotice.textContent =
          "This template is disabled because it is not running from localhost. Ask your coding agent to serve this exact file from a 127.0.0.1 helper server.";
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        resultElement.textContent = "";
        submitButton.disabled = true;

        const values = valuesFromForm();
        const payload = { fields, values };

        try {
          if (!canSubmitCredentialForm()) {
            throw new Error(
              "This form only submits from loopback with a valid credential field configuration.",
            );
          }
          const response = await fetch(LOCAL_SUBMIT_PATH, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (!response.ok) {
            throw new Error(`Local helper returned HTTP ${response.status}.`);
          }
          clearSecretInputs();
          showNotice({
            paragraphs: [
              "Credentials sent to the local helper.",
              "Return to your coding agent and approve the next command.",
            ],
            summary: redactedSummary(fields, values),
          });
        } catch (error) {
          showNotice({
            warning: true,
            paragraphs: [
              userFacingSubmitError(error),
              "No values were accepted. Keep this page open and ask your coding agent to fix the local helper.",
            ],
          });
          submitButton.disabled = !canSubmitCredentialForm();
        }
      });
    </script>
  </body>
</html>
