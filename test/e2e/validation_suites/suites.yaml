suites:
  smoke:
    requires_state: &id001
      gateway.health: healthy
      sandbox.status: running
    steps: &id002
    - id: cli-available
      script: smoke/00-cli-available.sh
    - id: gateway-health
      script: smoke/01-gateway-health.sh
    - id: sandbox-listed
      script: smoke/02-sandbox-listed.sh
    - id: sandbox-shell
      script: smoke/03-sandbox-shell.sh
  inference:
    requires_state: &id003
      gateway.health: healthy
      sandbox.status: running
      inference.expected: available
    steps: &id004
    - id: models-health
      script: inference/cloud/00-models-health.sh
    - id: chat-completion
      script: inference/cloud/01-chat-completion.sh
    - id: sandbox-inference-local
      script: inference/cloud/02-inference-local-from-sandbox.sh
  credentials:
    requires_state: &id007
      credentials.expected: present
    steps: &id008
    - id: credentials-present
      script: security/credentials/00-credentials-present.sh
    - id: no-plaintext-host-store
      script: security/credentials/01-no-plaintext-host-store.sh
  baseline-onboarding:
    requires_state:
      cli.installed: true
      sandbox.status: running
    steps:
    - id: cli-and-openshell
      script: baseline-onboarding/00-cli-and-openshell.sh
    - id: sandbox-state
      script: baseline-onboarding/01-sandbox-state.sh
    - id: route-and-smoke
      script: baseline-onboarding/02-route-and-smoke.sh
  onboarding-state:
    requires_state:
      sandbox.status: running
      onboarding_state.provider: nvidia-prod
    steps:
    - id: registry-provider-model-policies
      script: onboarding/state/00-registry-provider-model-policies.sh
    - id: session-provider-model-policies
      script: onboarding/state/01-session-provider-model-policies.sh
  local-ollama-inference:
    requires_state:
      gateway.health: healthy
      sandbox.status: running
      inference.expected: available
    steps:
    - id: ollama-models-health
      script: inference/ollama-gpu/00-ollama-models-health.sh
    - id: ollama-chat-completion
      script: inference/ollama-gpu/01-ollama-chat-completion.sh
  ollama-proxy:
    requires_state: &id005
      gateway.health: healthy
      sandbox.status: running
    steps: &id006
    - id: proxy-reachable
      script: inference/ollama-auth-proxy/00-proxy-reachable.sh
  platform-macos:
    requires_state:
      cli.installed: true
    steps:
    - id: macos-smoke
      script: platform/macos/00-macos-smoke.sh
  platform-wsl:
    requires_state:
      gateway.health: healthy
      sandbox.status: running
    steps:
    - id: wsl-smoke
      script: platform/wsl/00-wsl-smoke.sh
  hermes-specific:
    requires_state:
      gateway.health: healthy
      sandbox.status: running
      sandbox.agent: hermes
    steps:
    - id: hermes-health
      script: hermes/00-hermes-health.sh
  gateway-health:
    requires_state: *id001
    steps: *id002
  sandbox-shell:
    requires_state: *id001
    steps: *id002
  cloud-inference:
    requires_state: *id003
    steps: *id004
  ollama-auth-proxy:
    requires_state: *id005
    steps:
    - id: proxy-reachable
      script: inference/ollama-auth-proxy/00-proxy-reachable.sh
    - id: auth-enforcement
      script: inference/ollama-auth-proxy/01-auth-enforcement.sh
  security-credentials:
    requires_state:
      credentials.expected: present
    steps:
    - id: credentials-present
      script: security/credentials/00-credentials-present.sh
    - id: no-plaintext-host-store
      script: security/credentials/01-no-plaintext-host-store.sh
  messaging-telegram:
    requires_state: *id001
    steps:
    - id: messaging-provider-attached
      script: messaging/common/00-provider-attached.sh
    - id: messaging-placeholder-configured
      script: messaging/common/01-placeholder-configured.sh
    - id: messaging-no-secret-leak
      script: messaging/common/02-no-secret-leak.sh
    - id: messaging-bridge-reachable
      script: messaging/common/03-bridge-reachable.sh
    - id: telegram-injection-safety
      script: messaging/telegram/00-telegram-injection-safety.sh
    - id: telegram-injection-payload-classes
      script: messaging/telegram/01-telegram-injection-payload-classes.sh
  messaging-discord:
    requires_state: *id001
    steps:
    - id: messaging-provider-attached
      script: messaging/common/00-provider-attached.sh
    - id: messaging-placeholder-configured
      script: messaging/common/01-placeholder-configured.sh
    - id: messaging-no-secret-leak
      script: messaging/common/02-no-secret-leak.sh
    - id: messaging-bridge-reachable
      script: messaging/common/03-bridge-reachable.sh
    - id: discord-gateway-path
      script: messaging/discord/00-discord-gateway-path.sh
  messaging-slack:
    requires_state: *id001
    steps:
    - id: messaging-provider-attached
      script: messaging/common/00-provider-attached.sh
    - id: messaging-placeholder-configured
      script: messaging/common/01-placeholder-configured.sh
    - id: messaging-no-secret-leak
      script: messaging/common/02-no-secret-leak.sh
    - id: messaging-bridge-reachable
      script: messaging/common/03-bridge-reachable.sh
    - id: slack-provider-state
      script: messaging/slack/00-slack-provider-state.sh
  security-shields:
    requires_state:
      sandbox.status: running
    steps:
    - id: shields-config-consistent
      script: security/shields/00-config-consistent.sh
  inference-routing:
    requires_state: *id003
    steps:
    - id: inference-local-chat-completion
      script: inference/routing/00-inference-local-chat-completion.sh
    - id: provider-route-health
      script: inference/routing/01-provider-route-health.sh
  sandbox-lifecycle:
    requires_state:
      gateway.health: healthy
      sandbox.status: running
    steps:
    - id: gateway-health
      script: sandbox/lifecycle/00-gateway-health.sh
    - id: gateway-recovery
      script: sandbox/lifecycle/01-gateway-recovery.sh
  sandbox-operations:
    requires_state:
      gateway.health: healthy
      sandbox.status: running
    steps:
    - id: list-and-status
      script: sandbox/operations/00-list-and-status.sh
    - id: logs-and-exec
      script: sandbox/operations/01-logs-and-exec.sh
  snapshot:
    requires_state:
      gateway.health: healthy
      sandbox.status: running
    steps:
    - id: snapshot-list
      script: smoke/02-sandbox-listed.sh
  snapshot-lifecycle:
    requires_state:
      gateway.health: healthy
      sandbox.status: running
    steps:
    - id: create-list-restore
      script: sandbox/snapshot/00-create-list-restore.sh
  rebuild:
    requires_state: *id001
    steps:
    - id: rebuild-state-preserved
      script: rebuild_upgrade/00-state-preserved.sh
    - id: rebuild-agent-version-upgraded
      script: rebuild_upgrade/01-agent-version-upgraded.sh
    - id: rebuild-post-inference
      script: rebuild_upgrade/02-post-rebuild-inference.sh
    - id: rebuild-policy-config-preserved
      script: rebuild_upgrade/03-policy-config-preserved.sh
  upgrade:
    requires_state: *id001
    steps:
    - id: upgrade-survivor-reachable
      script: rebuild_upgrade/04-upgrade-survivor-reachable.sh
  diagnostics:
    requires_state: *id001
    steps: *id002
  docs-validation:
    requires_state: *id001
    steps: *id002
  openai-compatible-inference:
    requires_state: *id003
    steps: *id004
  inference-switch:
    requires_state: *id003
    steps:
    - id: route-state-updated
      script: inference/switch/00-route-state-updated.sh
    - id: switched-inference-local-chat
      script: inference/switch/01-switched-inference-local-chat.sh
  kimi-compatibility:
    requires_state: *id003
    steps:
    - id: plugin-wiring
      script: inference/kimi-compatibility/00-plugin-wiring.sh
    - id: kimi-compatible-models-route
      script: inference/kimi-compatibility/01-kimi-compatible-models-route.sh
  model-router:
    requires_state: *id003
    steps:
    - id: healthy-endpoint
