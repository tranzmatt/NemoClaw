      script: inference/model-router/01-provider-routed-completion.sh
  messaging-token-rotation:
    requires_state: *id001
    steps:
    - id: provider-rotation-isolated
      script: messaging/token-rotation/00-provider-rotation-isolated.sh
  security-policy:
    requires_state:
      sandbox.status: running
    steps:
    - id: telegram-preset-applied
      script: security/policy/00-telegram-preset-applied.sh
    - id: openshell-version-supports-credential-rewrite
      script: security/policy/01-openshell-version-supports-credential-rewrite.sh
  security-injection:
    requires_state:
      sandbox.status: running
    steps:
    - id: telegram-message-not-shell-executed
      script: security/injection/00-telegram-message-not-shell-executed.sh
