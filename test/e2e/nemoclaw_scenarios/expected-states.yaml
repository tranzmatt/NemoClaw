#
# Expected state configs.
#
# Each entry describes the observable contract that must be true after
# setup/install/onboarding completes for a given scenario. Expected states
# are reusable: multiple setup scenarios can resolve to the same expected
# state when they produce the same completed environment.
#
# Schema keys are intentionally small and structural. Deeper behavior lives
# in suites; expected states answer "is the environment in the shape we
# expect?" not "does every feature still work?".
#
# Negative/preflight expected states (e.g. `preflight-failure-no-sandbox`)
# are introduced in Phase 9 alongside their first consuming scenario.

expected_states:
  cloud-openclaw-ready:
    cli:
      installed: true
    gateway:
      expected: present
      health: healthy
    sandbox:
      expected: present
      status: running
      agent: openclaw
    inference:
      expected: available
      provider: nvidia
      route: inference-local
      mode: gateway-routed
    credentials:
      expected: present
      storage: gateway-managed
    security:
      policy_engine: supported
      shields: supported

  macos-cli-ready-docker-optional:
    cli:
      installed: true
    gateway:
      expected: optional
      health: optional
    sandbox:
      expected: optional
      status: optional
      agent: openclaw
    inference:
      expected: optional
      provider: nvidia
      route: inference-local
      mode: gateway-routed
    credentials:
      expected: optional
      storage: gateway-managed
    security:
      policy_engine: supported
      shields: supported

  cloud-openclaw-custom-policies-ready:
    cli:
      installed: true
    gateway:
      expected: present
      health: healthy
    sandbox:
      expected: present
      status: running
      agent: openclaw
    inference:
      expected: available
      provider: nvidia
      route: inference-local
      mode: gateway-routed
    credentials:
      expected: present
      storage: gateway-managed
    onboarding_state:
      provider: nvidia-prod
      model: nvidia/nemotron-3-super-120b-a12b
      policy_presets: npm,pypi
    security:
      policy_engine: supported
      shields: supported

  cloud-hermes-ready:
    cli:
      installed: true
    gateway:
      expected: present
      health: healthy
    sandbox:
      expected: present
      status: running
      agent: hermes
    inference:
      expected: available
      provider: nvidia
      route: inference-local
      mode: gateway-routed
    credentials:
      expected: present
      storage: gateway-managed
    security:
      policy_engine: supported
      shields: supported

  local-ollama-openclaw-ready:
    cli:
      installed: true
    gateway:
      expected: present
      health: healthy
    sandbox:
      expected: present
      status: running
      agent: openclaw
    inference:
      expected: available
      provider: ollama
      route: inference-local
      mode: gateway-routed
    credentials:
      expected: present
      storage: gateway-managed
    security:
      policy_engine: supported
      shields: supported

  # Negative preflight state. Setup is expected to fail and the runner
  # must confirm that no gateway or sandbox ghost state was left behind.
  # The `expected_failure` block (added for #3608) is the structured
  # contract the runner matches against; the legacy `failure` block is
  # retained as a drift guard while scenarios migrate.
  preflight-failure-no-sandbox:
    cli:
      installed: true
    gateway:
      expected: absent
    sandbox:
      expected: absent
    failure:
      expected: true
      stage: preflight
    expected_failure:
      phase: preflight
      error_class: docker-missing
      # Docker, container, daemon, socket, or preflight - case insensitive.
      message_pattern: "(?i)docker|container|daemon|socket|preflight"
      forbidden_side_effects:
        - sandbox-created
        - gateway-started
        - credentials-written

  onboarding-failure-invalid-nvidia-key:
    cli:
      installed: true
    gateway:
      expected: absent
    sandbox:
      expected: absent
    failure:
      expected: true
      stage: onboarding
      reason: invalid-nvidia-api-key
      exit_code: 1
      message_contains: Invalid NVIDIA API key. Must start with nvapi-
      no_stack_trace: true

  onboarding-failure-gateway-port-conflict:
    cli:
      installed: true
    gateway:
      expected: absent
    sandbox:
      expected: absent
    failure:
      expected: true
      stage: onboarding
      reason: gateway-port-conflict
      exit_code: 1
      message_contains: Port 18080 is not available
      no_stack_trace: true
