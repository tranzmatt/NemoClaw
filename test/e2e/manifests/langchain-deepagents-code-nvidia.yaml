apiVersion: nemoclaw.io/v1
kind: NemoClawInstance
metadata:
  name: langchain-deepagents-code-nvidia
spec:
  setup:
    install:
      source: repo-current
    runtime:
      containerEngine: docker
      containerDaemon: running
    platform:
      os: ubuntu
      executionTarget: local
  onboarding:
    agent: langchain-deepagents-code
    provider: nvidia
    modelRoute: inference-local
    policyTier: balanced
    messaging: []
    features:
      terminalRuntime: true
      interactiveCommand: dcode
      headlessCommand: dcode -n
      observability: true
      remoteDeepAgentsSandboxes: false
      mcpAutoLoad: false
  state:
    workspaceRef: default
    credentialRefs:
      - NVIDIA_INFERENCE_API_KEY
