apiVersion: nemoclaw.io/v1
kind: NemoClawInstance
metadata:
  name: openclaw-ollama-gpu
spec:
  setup:
    install:
      source: repo-current
    runtime:
      containerEngine: docker
      containerDaemon: running
      gpuRuntime: cdi
    platform:
      os: ubuntu
      executionTarget: local
  onboarding:
    agent: openclaw
    provider: ollama
    modelRoute: inference-local
    policyTier: balanced
    messaging: []
  state:
    workspaceRef: default
    credentialRefs: []
