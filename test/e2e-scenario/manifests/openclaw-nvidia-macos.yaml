apiVersion: nemoclaw.io/v1
kind: NemoClawInstance
metadata:
  name: openclaw-nvidia-macos
spec:
  setup:
    install:
      source: repo-current
    runtime:
      containerEngine: docker
      containerDaemon: optional
    platform:
      os: macos
      executionTarget: local
  onboarding:
    agent: openclaw
    provider: nvidia
    modelRoute: inference-local
    policyTier: balanced
    messaging: []
  state:
    workspaceRef: default
    credentialRefs:
      - NVIDIA_API_KEY
