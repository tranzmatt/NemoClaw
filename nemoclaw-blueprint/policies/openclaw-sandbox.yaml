#
# Default policy for the OpenClaw sandbox.
# Principle: deny by default, allow only what's needed for core functionality.
# Dynamic updates (network_policies, inference) can be applied post-creation
# via `openshell policy set`. Static fields are effectively creation-locked.
#
# Policy tiers (future):
#   default — this file. Minimum for onboard + basic agent operation.
#   relaxed — adds third-party model providers, broader web access.
#
# To add endpoints: update this file and re-run `nemoclaw onboard`
# or apply dynamically via `openshell policy set`.

version: 1

filesystem_policy:
  # SECURITY: must be false. When true, OpenShell adds WORKDIR (/sandbox) to
  # read_write automatically, which overrides our read_only entry below because
  # Landlock grants the union of all matching rules. All needed writable paths
  # are declared explicitly in read_write.
  # Ref: https://github.com/NVIDIA/NemoClaw/issues/804
  include_workdir: false
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    - /sandbox                      # Home directory — read-only to prevent agents
                                    # from creating arbitrary files or modifying
                                    # their own runtime environment. Writable state
                                    # is restricted to /sandbox/.openclaw-data.
                                    # Ref: https://github.com/NVIDIA/NemoClaw/issues/804
    - /sandbox/.openclaw            # Immutable gateway config — prevents agent
                                    # from tampering with auth tokens or CORS.
                                    # Writable state (agents, plugins) lives in
                                    # /sandbox/.openclaw-data via symlinks.
                                    # Ref: https://github.com/NVIDIA/NemoClaw/issues/514
  read_write:
    - /tmp
    - /dev/null
    - /sandbox/.openclaw-data       # Writable agent/plugin state (symlinked from .openclaw)
    - /sandbox/.nemoclaw            # Plugin state and config (state.ts, config.ts).
                                    # Blueprints are root-owned; sticky bit (1755)
                                    # on parent prevents rename/delete (#1607).

# TODO: evaluate landlock enforce mode — currently best_effort because
# enforce can break things in unpredictable ways. Needs thorough testing
# across different kernel versions before we flip this. (ref #516 item 3)
landlock:
  compatibility: best_effort

# Note: tool-level write/edit restrictions for openclaw.json are intentionally
# NOT declared here. OpenShell's PolicyFile schema does not support a
# `tool_policy` section (serde deny_unknown_fields — only version, filesystem_policy,
# landlock, process, network_policies are accepted). Config protection is
# achieved entirely through filesystem_policy (read_only + /etc/openclaw mount)
# and the root:root 555 permission lock on /sandbox/.openclaw/.
# Ref: https://github.com/NVIDIA/NemoClaw/pull/654#pullrequestreview-…

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  claude_code:
    name: claude_code
    endpoints:
      - host: api.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: POST, path: "/v1/messages" }
          - allow: { method: POST, path: "/v1/messages/batches" }
          - allow: { method: GET, path: "/v1/messages/batches/**" }
          - allow: { method: POST, path: "/v1/complete" }
      - host: statsig.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: POST, path: "/**" }
      # sentry.io is a multi-tenant SaaS — any authenticated client can POST
      # to ANY Sentry project, not just NemoClaw's. Allowing POST /** turned
      # the host into a generic exfiltration channel: a compromised agent
      # could ship stack traces, env vars, file contents, etc. to a Sentry
      # project controlled by an attacker via the public envelope endpoint
      # (https://sentry.io/api/<any-project>/envelope/). Path-pattern
      # restrictions cannot fix this because the project ID is part of the
      # URL and there is no server-side allowlist of legitimate projects.
      #
      # Block POST entirely. GET stays allowed because it has no request
      # body and is harmless for exfil. Side effect: Claude Code's crash
      # telemetry to Sentry is silently dropped — that is the right
      # tradeoff for a sandbox whose stated goal is preventing data egress.
      # See #1437.
      - host: sentry.io
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/claude }

  nvidia:
    name: nvidia
    endpoints:
      - host: integrate.api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: POST, path: "/v1/chat/completions" }
          - allow: { method: POST, path: "/v1/completions" }
          - allow: { method: POST, path: "/v1/embeddings" }
          - allow: { method: GET, path: "/v1/models" }
          - allow: { method: GET, path: "/v1/models/**" }
      - host: inference-api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: POST, path: "/v1/chat/completions" }
          - allow: { method: POST, path: "/v1/completions" }
          - allow: { method: POST, path: "/v1/embeddings" }
          - allow: { method: GET, path: "/v1/models" }
          - allow: { method: GET, path: "/v1/models/**" }
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/local/bin/openclaw }

  # NOTE: github.com / api.github.com and the git/gh binaries used to
  # live in this base policy and were therefore granted to every
  # sandbox regardless of user opt-in. They have been moved into a
  # discoverable preset (`presets/github.yaml`) so a sandbox only gets
  # GitHub access when the user explicitly selects the `github` preset
  # during onboard. See #1583.

  # ── OpenClaw "phone home" ────────────────────────────────────────────
  # Minimum viable set for OpenClaw to authenticate, discover plugins,
  # and reach ClawHub. Restricted to openclaw and node (skill flows run on Node).
  # Docs access is read-only (GET). ClawHub and openclaw.ai are
  # restricted to GET+POST (auth flows, plugin discovery).

  clawhub:
    name: clawhub
    endpoints:
      - host: clawhub.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/local/bin/node }

  openclaw_api:
    name: openclaw_api
    endpoints:
      - host: openclaw.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/local/bin/node }

  openclaw_docs:
    name: openclaw_docs
    endpoints:
      - host: docs.openclaw.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }

  # npm registry — needed for `openclaw plugins install` only.
  # Restricted to the openclaw binary so agents cannot use npm directly.
  # Users who need npm/node access should add the npm policy preset during onboard.
  # Ref: https://github.com/NVIDIA/NemoClaw/issues/1458
  npm_registry:
    name: npm_registry
    endpoints:
      - host: registry.npmjs.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }

  # ── Messaging — pre-allowed for OpenClaw agent notifications ────
  # Restricted to node processes to prevent arbitrary data exfiltration
  # via curl, wget, python, etc. (See: #272)
  telegram:
    name: telegram
    endpoints:
      - host: api.telegram.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/bot*/**" }
          - allow: { method: POST, path: "/bot*/**" }
          - allow: { method: GET, path: "/file/bot*/**" }
    binaries:
      - { path: /usr/local/bin/node }

  discord:
    name: discord
    endpoints:
      - host: discord.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      # WebSocket gateway — pure L4 CONNECT tunnel. OpenShell v0.0.15+
      # auto-terminates TLS unconditionally (NVIDIA/OpenShell#544), which
      # also applies to WSS. tls: skip restores the pre-v0.0.15 pass-
      # through behaviour needed here. Matches presets/discord.yaml.
      - host: gateway.discord.gg
        port: 443
        access: full
        tls: skip
      - host: cdn.discordapp.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/node }
