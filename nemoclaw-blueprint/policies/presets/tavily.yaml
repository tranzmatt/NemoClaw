preset:
  name: tavily
  description: "Tavily web search API access (opt-in)"

network_policies:
  tavily:
    name: tavily
    endpoints:
      - host: api.tavily.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      # OpenShell attributes Deep Agents Code Tavily requests to this managed
      # Python venv, which its strict Landlock policy mounts read-only.
      - { path: /opt/venv/bin/python3* }
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
      - { path: /usr/local/bin/curl }
      - { path: /usr/bin/curl }
