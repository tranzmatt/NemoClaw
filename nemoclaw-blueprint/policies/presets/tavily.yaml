preset:
  name: tavily
  description: "Tavily web search API access (opt-in)"

network_policies:
  tavily:
    name: tavily
    endpoints:
      - host: api.tavily.com
        port: 443
        protocol: rest
        enforcement: enforce
        # Hermes sends the resolver placeholder as the JSON `api_key` field.
        request_body_credential_rewrite: true
        rules:
          - allow: { method: POST, path: "/search" }
          - allow: { method: POST, path: "/extract" }
    binaries:
      # Agent runtimes: Deep Agents Code's managed Python (including versioned
      # python3 names), Hermes' exact venv Python, and OpenClaw's Node paths.
      - { path: /opt/venv/bin/python3* }
      - { path: /opt/hermes/.venv/bin/python }
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
      # Exact curl paths are used only by onboarding's post-create verifier;
      # requests remain constrained by the two POST rules above.
      - { path: /usr/local/bin/curl }
      - { path: /usr/bin/curl }
