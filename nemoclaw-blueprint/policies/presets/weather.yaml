preset:
  name: weather
  description: "Read-only public weather, geocoding, and alert APIs"

network_policies:
  weather:
    name: weather
    endpoints:
      # Host the bundled OpenClaw weather skill calls with curl on the pinned
      # OpenClaw version declared by agents/openclaw/manifest.yaml (2026.5.27).
      # Revalidate this host whenever that version changes; replace this prose
      # contract with parsed skill metadata if OpenClaw exposes it.
      # Paths are /<location> (city, region, airport code, or coordinates) and /:help.
      #
      # Why path "/**": wttr.in's location namespace IS the path — /<city>, /<airport>,
      # /<lat,lon>, /~<place>, /:help — so there is no narrower stable prefix to pin to.
      # Scope stays bounded: GET/HEAD only (every other method is denied by deny-by-default),
      # a single read-only public host, and no credentials are sent.
      - host: wttr.in
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: HEAD, path: "/**" }
      - host: api.open-meteo.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/v1/forecast" }
          - allow: { method: HEAD, path: "/v1/forecast" }
          - allow: { method: GET, path: "/v1/elevation" }
          - allow: { method: HEAD, path: "/v1/elevation" }
      - host: geocoding-api.open-meteo.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/v1/search" }
          - allow: { method: HEAD, path: "/v1/search" }
          - allow: { method: GET, path: "/v1/get" }
          - allow: { method: HEAD, path: "/v1/get" }
      - host: api.weather.gov
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/points/**" }
          - allow: { method: HEAD, path: "/points/**" }
          - allow: { method: GET, path: "/gridpoints/**" }
          - allow: { method: HEAD, path: "/gridpoints/**" }
          - allow: { method: GET, path: "/alerts" }
          - allow: { method: HEAD, path: "/alerts" }
          - allow: { method: GET, path: "/alerts/**" }
          - allow: { method: HEAD, path: "/alerts/**" }
          - allow: { method: GET, path: "/stations" }
          - allow: { method: HEAD, path: "/stations" }
          - allow: { method: GET, path: "/stations/**" }
          - allow: { method: HEAD, path: "/stations/**" }
          - allow: { method: GET, path: "/zones" }
          - allow: { method: HEAD, path: "/zones" }
          - allow: { method: GET, path: "/zones/**" }
          - allow: { method: HEAD, path: "/zones/**" }
          - allow: { method: GET, path: "/offices" }
          - allow: { method: HEAD, path: "/offices" }
          - allow: { method: GET, path: "/offices/**" }
          - allow: { method: HEAD, path: "/offices/**" }
          - allow: { method: GET, path: "/products" }
          - allow: { method: HEAD, path: "/products" }
          - allow: { method: GET, path: "/products/**" }
          - allow: { method: HEAD, path: "/products/**" }
          - allow: { method: GET, path: "/openapi.json" }
          - allow: { method: HEAD, path: "/openapi.json" }
          - allow: { method: GET, path: "/openapi.yaml" }
          - allow: { method: HEAD, path: "/openapi.yaml" }
    binaries:
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
      - { path: /usr/local/bin/hermes }
      - { path: /opt/hermes/.venv/bin/python }
      - { path: /usr/bin/python3 }
      - { path: /usr/bin/python3.11 }
      - { path: /usr/bin/curl }
      - { path: /usr/local/bin/curl }
