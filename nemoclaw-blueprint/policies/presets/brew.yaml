preset:
  name: brew
  # The brew binary is preinstalled in the sandbox base image (#3913), so this
  # preset only needs to grant the network egress used by `brew install` to
  # fetch formulae and bottles.
  description: "Homebrew (Linuxbrew) package manager access (brew binary preinstalled in base image)"

network_policies:
  brew:
    name: brew
    endpoints:
      - host: formulae.brew.sh
        port: 443
        access: full
        tls: skip
      - host: github.com
        port: 443
        access: full
        tls: skip
      - host: ghcr.io
        port: 443
        access: full
        tls: skip
      - host: pkg-containers.githubusercontent.com
        port: 443
        access: full
        tls: skip
      - host: objects.githubusercontent.com
        port: 443
        access: full
        tls: skip
      - host: raw.githubusercontent.com
        port: 443
        access: full
        tls: skip
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/bin/git }
      - { path: /usr/local/bin/brew }
      - { path: /home/linuxbrew/.linuxbrew/bin/brew }
      - { path: /home/linuxbrew/.linuxbrew/bin/* }
      - { path: /home/linuxbrew/.linuxbrew/Homebrew/bin/* }
