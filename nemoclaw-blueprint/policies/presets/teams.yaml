preset:
  name: teams
  description: "Microsoft Teams Bot Framework and Graph API access"

network_policies:
  teams:
    name: teams
    endpoints:
      # Azure AD app credential exchange for the Bot Framework and Graph scopes.
      - host: login.microsoftonline.com
        port: 443
        protocol: rest
        enforcement: enforce
        request_body_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      # Bot Framework token scope, OpenID metadata, and connector calls.
      - host: login.botframework.com
        port: 443
        protocol: rest
        enforcement: enforce
        request_body_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: api.botframework.com
        port: 443
        protocol: rest
        enforcement: enforce
        request_body_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      # Public Teams Bot Connector service URL used by incoming activities.
      # The SDK follows serviceUrl values from inbound activities, and Bot
      # Framework connector paths are region/tenant dependent; keep the
      # connector host method-scoped while Graph/media hosts stay read-only.
      - host: smba.trafficmanager.net
        port: 443
        protocol: rest
        enforcement: enforce
        request_body_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
          - allow: { method: DELETE, path: "/**" }
      # Teams plugin media and delegated context helpers use Microsoft Graph.
      - host: graph.microsoft.com
        port: 443
        protocol: rest
        enforcement: enforce
        request_body_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
      # Read-only Teams/Office media surfaces referenced by Teams messages.
      - host: teams.microsoft.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      - host: teams.cdn.office.net
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      - host: statics.teams.cdn.office.net
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      - host: "*.sharepoint.com"
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      - host: 1drv.ms
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
