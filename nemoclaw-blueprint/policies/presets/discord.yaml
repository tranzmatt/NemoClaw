preset:
  name: discord
  description: "Discord API, gateway, and CDN access"

network_policies:
  discord:
    name: discord
    endpoints:
      - host: discord.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
          - allow: { method: PATCH, path: "/**" }
          # DELETE only on message and reaction endpoints — not all paths
          # Reaction DELETE requires an extra path segment: /reactions/{emoji}/@me or /{user_id}
          - allow: { method: DELETE, path: "/api/v*/channels/*/messages/*" }
          - allow: { method: DELETE, path: "/api/v*/channels/*/messages/*/reactions/*/*" }
      # WebSocket gateway — pure L4 CONNECT tunnel. OpenShell v0.0.15+
      # auto-terminates TLS unconditionally (NVIDIA/OpenShell#544), which
      # also applies to WSS. tls: skip restores the pre-v0.0.15 pass-
      # through behaviour needed here.
      - host: gateway.discord.gg
        port: 443
        access: full
        tls: skip
      - host: cdn.discordapp.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      # Media/attachment access (read-only, proxied through Discord CDN)
      - host: media.discordapp.net
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
