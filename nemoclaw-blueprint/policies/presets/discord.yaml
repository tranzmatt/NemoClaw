preset:
  name: discord
  description: "Discord API, gateway, and CDN access"

network_policies:
  discord:
    name: discord
    endpoints:
      - host: discord.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
          - allow: { method: PATCH, path: "/**" }
          # DELETE only on message and reaction endpoints — not all paths
          # Reaction DELETE requires an extra path segment: /reactions/{emoji}/@me or /{user_id}
          - allow: { method: DELETE, path: "/api/v*/channels/*/messages/*" }
          - allow: { method: DELETE, path: "/api/v*/channels/*/messages/*/reactions/*/*" }
      # WebSocket gateway. OpenShell's WebSocket L7 relay validates the
      # upgrade, allows client text frames on the upgraded path, and rewrites
      # the sandbox placeholder token in Discord IDENTIFY at the relay
      # boundary.
      - host: gateway.discord.gg
        port: 443
        protocol: websocket
        enforcement: enforce
        websocket_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: WEBSOCKET_TEXT, path: "/**" }
      - host: "*.discord.gg"
        port: 443
        protocol: websocket
        enforcement: enforce
        websocket_credential_rewrite: true
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: WEBSOCKET_TEXT, path: "/**" }
      - host: cdn.discordapp.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      # Media/attachment access (read-only, proxied through Discord CDN)
      - host: media.discordapp.net
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
