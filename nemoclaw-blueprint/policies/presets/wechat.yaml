# WeChat (personal) channel egress over Tencent's iLink Bot API.
#
# Used by two bridge implementations: @tencent-weixin/openclaw-weixin (Node,
# OpenClaw) and the built-in Hermes WeChat adapter (Python aiohttp). Both
# hit the same iLink hosts, so a single preset covers both agents.
#
# OpenShell's SSRF engine matches `host:` as a literal string — `*.wechat.com`
# style wildcards are accepted by NemoClaw's preset validator but never expand
# at runtime, so any traffic to a non-listed subdomain logs `policy:- engine:ssrf`
# and fails DNS resolution. Until OpenShell ships wildcard support, every iLink
# IDC host either bridge can hit must be listed explicitly here.
#
# Known hosts (extend when an operator observes a new IDC redirect):
#   - ilinkai.weixin.qq.com           bootstrap; hard-coded in src/ext/wechat/qr.ts
#                                     and Hermes' WEIXIN_BASE_URL default per
#                                     hermes-agent docs/messaging/weixin
#   - ilinkai.wechat.com              per-account baseUrl returned after QR confirm
#
# To discover more: tail the sandbox OCSF log for `DENIED ... -> <host>:443`
# entries during the bridge's getUpdates loop and add the host below, then
# rebuild. The host also surfaces in `session.wechatConfig.baseUrl` for the
# operator's own account at login time.
preset:
  name: wechat
  description: "WeChat (personal) iLink API access (OpenClaw + Hermes)"

network_policies:
  wechat_bridge:
    name: wechat_bridge
    endpoints:
      - host: ilinkai.weixin.qq.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: ilinkai.wechat.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    # Each bridge runs under its agent's interpreter — Node for OpenClaw,
    # Python for Hermes. Listing both keeps the preset apply idempotent
    # across agents; unused entries never match anything in the sandbox.
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/node }
      - { path: /usr/bin/python3* }
      - { path: /opt/hermes/.venv/bin/python }
